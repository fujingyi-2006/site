<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>小车动画</title>
  <style>
    body {
      margin: 0;
      background: #f0f0f0;
      overflow: hidden;
    }
    .car {
      width: 80px;
      height: 40px;
      background: red;
      border-radius: 8px;
      position: absolute;
      bottom: 50px;
      animation: run 5s linear infinite;
    }
    @keyframes run {
      0% { left: -100px; }
      100% { left: 100vw; }
    }
  </style>
</head>
<body>
  <div class="car"></div>
</body>
</html>
